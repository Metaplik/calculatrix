<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRYPT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden; background: #000; color: #0f0;
            font-family: 'VT323', monospace; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            position: relative; padding: 12px;
        }
        #matrix {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 1; display: block;
        }
        .overlay {
            position: relative; z-index: 2;
            width: 100%; max-width: 420px;
            background: rgba(10,10,10,0.93);
            border: 3px solid #0f0; border-radius: 16px;
            padding: 16px 14px;
            box-shadow: 0 0 25px rgba(0,255,0,0.4);
            text-align: center; max-height: 96vh; overflow-y: auto;
        }
        h1 { font-size: 34px; margin-bottom: 6px; letter-spacing: 2px; }
        input[type=text] {
            width: 100%; padding: 10px; margin: 8px 0;
            background: #111; border: 2px solid #0f0;
            color: #0f0; font-size: 20px; text-align: center;
            font-family: 'VT323', monospace; border-radius: 4px;
        }
        button.small {
            background: #111; color: #0f0; border: 2px solid #0f0;
            padding: 8px 16px; margin: 4px; font-size: 18px;
            font-family: 'VT323', monospace; cursor: pointer; border-radius: 4px;
        }
        button.small:active { background: #0f0; color: #000; }
        .push-row {
            display: flex; align-items: center; justify-content: center;
            gap: 14px; margin: 12px 0;
        }
        .circle-btn {
            width: 56px; height: 56px; border-radius: 50%;
            background: #0a1a0a; border: 2px solid #0f0;
            color: #0f0; font-size: 18px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.15s; box-shadow: 0 0 8px rgba(0,255,0,0.4);
            font-family: 'VT323', monospace;
        }
        .circle-btn.active {
            background: #2a0a0a; border-color: #f00; color: #f00;
            box-shadow: 0 0 10px rgba(255,0,0,0.6);
        }
        .circle-btn:active { transform: scale(0.95); }

        /* ===== NOUVEAU BOUTON PUSH AVEC IMAGE ===== */
        #talkBtnWrapper {
            position: relative;
            width: 110px;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* Liseré vert fluo tournant fin */
        #talkBtnWrapper::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: conic-gradient(
                transparent 0deg,
                #0f0 60deg,
                #00ff88 120deg,
                #0f0 180deg,
                transparent 240deg,
                transparent 360deg
            );
            animation: rainbowSpin 1.6s linear infinite;
            z-index: 0;
        }

        /* Masque intérieur pour faire un anneau très fin */
        #talkBtnWrapper::after {
            content: '';
            position: absolute;
            inset: 1px;
            border-radius: 50%;
            background: #000;
            z-index: 1;
        }

        @keyframes rainbowSpin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        /* L'image du bouton */
        #talkBtn {
            position: relative;
            z-index: 2;
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            display: block;
            transition: transform 0.05s, filter 0.05s;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        #talkBtn img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: block;
            pointer-events: none;
            filter: drop-shadow(0 0 8px rgba(255, 140, 0, 0.7));
        }

        /* État actif : léger scale + glow vert */
        #talkBtn.pressing {
            transform: scale(0.93);
            filter: drop-shadow(0 0 16px #0f0);
        }

        #talkBtn.pressing img {
            filter: drop-shadow(0 0 12px #0f0) brightness(1.15);
        }

        /* ===== CHRONOMÈTRE POP-UP ===== */
        #timerPopup {
            position: absolute;
            top: -46px;
            left: 50%;
            transform: translateX(-50%) scale(0.7);
            background: rgba(0,0,0,0.88);
            border: 2px solid #0f0;
            border-radius: 20px;
            padding: 4px 14px;
            font-family: 'VT323', monospace;
            font-size: 22px;
            color: #0f0;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s, transform 0.15s;
            z-index: 10;
            box-shadow: 0 0 10px rgba(0,255,0,0.5);
        }

        #timerPopup.visible {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        /* Animation de départ (Snapchat-like) */
        #timerPopup.sending {
            animation: snapSend 0.45s ease-out forwards;
        }

        @keyframes snapSend {
            0%   { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
            60%  { opacity: 0.6; transform: translateX(-50%) scale(1.2) translateY(-18px); }
            100% { opacity: 0; transform: translateX(-50%) scale(0.5) translateY(-40px); }
        }

        /* ===== FIN NOUVEAU BOUTON ===== */

        .action-bar {
            display: flex; justify-content: center; gap: 20px;
            margin: 8px 0; flex-wrap: wrap;
        }
        .action-circle {
            width: 60px; height: 60px; border-radius: 50%;
            background: #0a1a0a; border: 2px solid #0f0;
            color: #0f0; font-size: 28px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.1s;
            box-shadow: 0 0 8px rgba(0,255,0,0.3);
        }
        .action-circle:active { background: #0f0; color: #000; transform: scale(0.95); }

        #videoPanel {
            display: none; margin: 8px 0;
            border: 2px solid #0f0; border-radius: 10px;
            overflow: hidden; position: relative; background: #000;
        }
        #remoteVideo { width: 100%; max-height: 200px; object-fit: cover; display: block; }
        #localVideo {
            position: absolute; bottom: 6px; right: 6px;
            width: 80px; height: 60px; object-fit: cover;
            border: 2px solid #0f0; border-radius: 6px; background: #111;
        }
        .video-label {
            position: absolute; top: 6px; left: 8px;
            font-size: 14px; color: #0f0; text-shadow: 0 0 4px #0f0;
        }
        #status { font-size: 20px; min-height: 40px; margin-top: 6px; }
        .connected-list {
            background: #111; border: 2px solid #0f0;
            padding: 6px; max-height: 80px; overflow-y: auto;
            font-size: 16px; text-align: left; margin: 6px 0; border-radius: 4px;
        }
        .messaging-area { margin-top: 12px; border-top: 1px solid #2a8f2a; padding-top: 10px; }
        .chat-title { font-size: 18px; text-align: left; margin-bottom: 6px; }
        .messages-box {
            background: #0a0a0a; border: 1px solid #2a8f2a; border-radius: 12px;
            padding: 8px; display: flex; flex-direction: column; gap: 6px;
            margin-bottom: 8px; text-align: left; max-height: 220px; overflow-y: auto;
        }
        .msg-bubble {
            max-width: 88%; padding: 6px 10px; border-radius: 14px;
            font-size: 15px; line-height: 1.3; word-break: break-word;
            font-family: 'VT323', monospace;
        }
        .msg-left { align-self: flex-start; background: #1a2a1a; border-left: 3px solid #0f0; color: #cfc; }
        .msg-right { align-self: flex-end; background: #2a3a2a; border-right: 3px solid #0f0; color: #efe; }
        .msg-sender { font-size: 11px; opacity: 0.8; margin-bottom: 2px; }
        .msg-time { font-size: 10px; text-align: right; margin-top: 3px; opacity: 0.6; }
        .msg-media img { max-width: 100%; border-radius: 8px; margin-top: 4px; cursor: pointer; border: 1px solid #0f0; }
        .msg-media video { max-width: 100%; border-radius: 8px; margin-top: 4px; border: 1px solid #0f0; }
        .chat-input-row { display: flex; gap: 6px; margin-top: 4px; align-items: center; }
        .chat-input-row input {
            flex: 1; margin: 0; padding: 8px 12px; font-size: 16px;
            background: #111; border: 1px solid #0f0; border-radius: 40px;
            color: #0f0; font-family: 'VT323', monospace;
        }
        .chat-input-row button {
            background: #111; border: 1px solid #0f0; color: #0f0;
            padding: 0 14px; border-radius: 40px; font-size: 20px; cursor: pointer;
            height: 40px;
        }
        .chat-input-row button:active { background: #0f0; color: #000; }
        #mediaPickerBtn { font-size: 18px; padding: 0 12px; }
        #fileInput { display: none; }
        #lightbox {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.92); z-index: 9999;
            justify-content: center; align-items: center;
        }
        #lightbox.open { display: flex; }
        #lightbox img { max-width: 95vw; max-height: 90vh; border: 2px solid #0f0; border-radius: 8px; }
        #lightbox-close {
            position: absolute; top: 16px; right: 20px;
            font-size: 36px; color: #0f0; cursor: pointer; font-family: 'VT323', monospace;
        }
        #callPopup {
            display: none; position: fixed; inset: 0; z-index: 8888;
            background: rgba(0,0,0,0.85); justify-content: center; align-items: center;
        }
        #callPopup.open { display: flex; }
        .call-box {
            background: #0a0a0a; border: 3px solid #0f0;
            border-radius: 16px; padding: 28px 32px; text-align: center;
            box-shadow: 0 0 30px rgba(0,255,0,0.5);
        }
        .call-box h2 { font-size: 26px; margin-bottom: 10px; }
        .call-box p { font-size: 16px; color: #aaa; margin-bottom: 18px; }
        .call-actions { display: flex; gap: 16px; justify-content: center; }
        .call-accept {
            background: #0a2a0a; border: 2px solid #0f0; color: #0f0;
            font-size: 20px; font-family: 'VT323', monospace;
            padding: 10px 24px; border-radius: 8px; cursor: pointer;
        }
        .call-accept:hover { background: rgba(0,255,0,0.15); }
        .call-reject {
            background: #2a0a0a; border: 2px solid #f00; color: #f00;
            font-size: 20px; font-family: 'VT323', monospace;
            padding: 10px 24px; border-radius: 8px; cursor: pointer;
        }
        .call-reject:hover { background: rgba(255,0,0,0.15); }
        .info { font-size: 13px; color: #0a0; margin-top: 10px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #0f0; border-radius: 2px; }
    </style>
</head>
<body>
<canvas id="matrix"></canvas>
<div id="lightbox"><span id="lightbox-close">X</span><img id="lightbox-img" src="" alt="photo"></div>
<div id="callPopup"><div class="call-box"><h2 id="callPopupTitle">APPEL ENTRANT</h2><p id="callPopupSender">De : ???</p><div class="call-actions"><button class="call-accept" id="callAcceptBtn">ACCEPTER</button><button class="call-reject" id="callRejectBtn">REFUSER</button></div></div></div>
<div class="overlay">
    <h1>CRYPT</h1>
    <input type="text" id="roomName" placeholder="Code">
    <button onclick="joinRoom()" class="small">REJOINDRE</button>
    <div style="margin-top:6px;text-align:left;font-size:16px;">Connectes :</div>
    <div id="connectedList" class="connected-list">Aucun</div>
    <div class="push-row">
        <button class="circle-btn" id="speakerLockBtn">HP</button>

        <!-- NOUVEAU BOUTON PUSH IMAGE -->
        <div id="talkBtnWrapper">
            <div id="timerPopup">⏱ 0:00</div>
            <button id="talkBtn">
                <img src="https://i.ibb.co/4ZJnrqP/speaker-orange.png" 
                     onerror="this.onerror=null; this.parentElement.style.background='rgba(255,140,0,0.85)'; this.style.display='none'; this.parentElement.innerHTML += '<span style=\'font-family:VT323,monospace;font-size:28px;color:#fff;font-weight:bold;\'>PUSH</span>';"
                     alt="PUSH">
            </button>
        </div>

        <button class="circle-btn" id="microMuteBtn">A/V</button>
    </div>
    <div class="action-bar">
        <div class="action-circle" id="callAudioBtn"><i class="fas fa-phone"></i></div>
        <div class="action-circle" id="callVideoBtn"><i class="fas fa-video"></i></div>
    </div>
    <div id="videoPanel"><video id="remoteVideo" autoplay playsinline></video><video id="localVideo" autoplay playsinline muted></video><div class="video-label">LIVE</div></div>
    <div id="status">Pret</div>
    <div class="messaging-area">
        <div class="chat-title">Messages</div>
        <div id="messagesBox" class="messages-box"></div>
        <div class="chat-input-row">
            <button id="mediaPickerBtn"><i class="fas fa-paperclip"></i></button>
            <input type="file" id="fileInput" accept="image/*,video/*">
            <input type="text" id="smsInput" placeholder="Message..." maxlength="300">
            <button id="sendSmsBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <div class="info">Maintiens PUSH pour parler · HP coupe le son recu · A/V coupe le micro · appel/visio pour raccrocher</div>
</div>
<script>
// ===================== MATRIX =====================
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
let width, height, columns, drops;
const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+[]{};:<>?,./\\|'\"`~ｦｧｨｩｪｫｬｭｮｯｰｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ";
function resizeMatrix() {
    width = window.innerWidth; height = window.innerHeight;
    canvas.width = width; canvas.height = height;
    const colCount = Math.floor(width / 18) + 5;
    columns = colCount;
    drops = new Array(colCount).fill(0).map(() => Math.random() * -height);
}
function drawMatrix() {
    if (!ctx) return;
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0, 0, width, height);
    ctx.fillStyle = '#0f0'; ctx.font = '18px "VT323", monospace';
    for (let i = 0; i < columns; i++) {
        const char = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(char, i * 18, drops[i] * 18);
        if (drops[i] * 18 > height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    }
    requestAnimationFrame(drawMatrix);
}
window.addEventListener('resize', resizeMatrix);
resizeMatrix(); drawMatrix();

// ===================== SONS =====================
function playBeep(freq, duration, vol) {
    vol = vol || 0.2;
    try {
        var ac = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ac.createOscillator(), gain = ac.createGain();
        osc.connect(gain); gain.connect(ac.destination);
        osc.frequency.value = freq; gain.gain.value = vol; osc.type = 'sine';
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + duration);
        osc.stop(ac.currentTime + duration);
        setTimeout(function(){ ac.close(); }, duration * 1000 + 100);
    } catch(e) {}
}
function playTalkieStart()  { playBeep(880, 0.08, 0.22); }
function playTalkieEnd()    { playBeep(660, 0.12, 0.22); }
function playSmsSent()      { playBeep(1200, 0.05, 0.18); setTimeout(function(){ playBeep(1500, 0.05, 0.18); }, 60); }
function playSmsReceived()  { playBeep(1000, 0.07, 0.16); setTimeout(function(){ playBeep(800, 0.09, 0.16); }, 100); }
function playCallRing()     { playBeep(440, 0.3, 0.25); setTimeout(function(){ playBeep(440, 0.3, 0.25); }, 500); }

// ===================== ETAT =====================
var peer, connections = [], localStream = null;
var mediaRecorder, audioChunks = [];
var isHost = false, myId = "";
var currentCall = null, pendingCall = null;
var speakerMuted = false;
var microMuted = false;
var isVideoCall = false;

var statusEl = document.getElementById('status');
var connectedListEl = document.getElementById('connectedList');
var talkBtn = document.getElementById('talkBtn');
var messagesBox = document.getElementById('messagesBox');
var smsInput = document.getElementById('smsInput');
var sendSmsBtn = document.getElementById('sendSmsBtn');
var callAudioBtn = document.getElementById('callAudioBtn');
var callVideoBtn = document.getElementById('callVideoBtn');
var videoPanel = document.getElementById('videoPanel');
var remoteVideo = document.getElementById('remoteVideo');
var localVideo = document.getElementById('localVideo');
var fileInput = document.getElementById('fileInput');
var mediaPickerBtn = document.getElementById('mediaPickerBtn');
var callPopup = document.getElementById('callPopup');
var callAcceptBtn = document.getElementById('callAcceptBtn');
var callRejectBtn = document.getElementById('callRejectBtn');
var callPopupTitle = document.getElementById('callPopupTitle');
var callPopupSender = document.getElementById('callPopupSender');
var lightbox = document.getElementById('lightbox');
var lightboxImg = document.getElementById('lightbox-img');
var lightboxClose = document.getElementById('lightbox-close');
var speakerLockBtn = document.getElementById('speakerLockBtn');
var microMuteBtn = document.getElementById('microMuteBtn');
var timerPopup = document.getElementById('timerPopup');

// ===================== CHRONOMÈTRE =====================
var timerInterval = null;
var timerSeconds = 0;

function formatTimer(s) {
    var m = Math.floor(s / 60);
    var sec = s % 60;
    return '⏱ ' + m + ':' + (sec < 10 ? '0' : '') + sec;
}

function startTimer() {
    timerSeconds = 0;
    timerPopup.textContent = formatTimer(0);
    timerPopup.classList.remove('sending');
    timerPopup.classList.add('visible');
    timerInterval = setInterval(function() {
        timerSeconds++;
        timerPopup.textContent = formatTimer(timerSeconds);
    }, 1000);
}

function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    // Animation Snapchat-like : le popup part vers le haut
    timerPopup.classList.remove('visible');
    timerPopup.classList.add('sending');
    setTimeout(function() {
        timerPopup.classList.remove('sending');
        timerSeconds = 0;
    }, 450);
}

// ===================== UI =====================
function updateList() {
    if (connections.length === 0) connectedListEl.innerHTML = "Aucun";
    else connectedListEl.innerHTML = connections.map(c => '> ' + c.peer.substring(0,14)).join('<br>');
}
function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
function addMessageToChat(content, sender, isOwn, type) {
    isOwn = isOwn || false; type = type || 'text';
    var time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    var msgDiv = document.createElement('div');
    msgDiv.classList.add('msg-bubble', isOwn ? 'msg-right' : 'msg-left');
    var bodyHtml = '';
    if (type === 'text') bodyHtml = '<div>' + escapeHtml(content) + '</div>';
    else if (type === 'image') bodyHtml = '<div class="msg-media"><img src="' + content + '" alt="photo" onclick="openLightbox(this.src)"></div>';
    else if (type === 'video') bodyHtml = '<div class="msg-media"><video src="' + content + '" controls playsinline></video></div>';
    msgDiv.innerHTML = '<div class="msg-sender">' + (isOwn ? 'Moi' : escapeHtml(sender)) + '</div>' + bodyHtml + '<div class="msg-time">' + time + '</div>';
    messagesBox.appendChild(msgDiv);
    msgDiv.scrollIntoView({behavior:'smooth', block:'end'});
}
function openLightbox(src) { lightboxImg.src = src; lightbox.classList.add('open'); }
lightboxClose.addEventListener('click', function(){ lightbox.classList.remove('open'); });
lightbox.addEventListener('click', function(e){ if (e.target === lightbox) lightbox.classList.remove('open'); });

// ===================== MUTE MICRO =====================
function applyMicroMuteToStream(stream) {
    if (!stream) return;
    stream.getAudioTracks().forEach(track => { track.enabled = !microMuted; });
}
microMuteBtn.addEventListener('click', function() {
    microMuted = !microMuted;
    microMuteBtn.classList.toggle('active', microMuted);
    if (microMuted) microMuteBtn.innerHTML = '<i class="fas fa-microphone-slash"></i>';
    else microMuteBtn.innerHTML = 'A/V';
    if (localStream) applyMicroMuteToStream(localStream);
});

// ===================== HAUT-PARLEUR =====================
speakerLockBtn.addEventListener('click', function() {
    speakerMuted = !speakerMuted;
    speakerLockBtn.classList.toggle('active', speakerMuted);
    speakerLockBtn.textContent = speakerMuted ? 'OFF' : 'HP';
    if (connections.length > 0) {
        var payload = { type: 'speaker-muted', muted: speakerMuted, senderId: myId };
        if (isHost) broadcast(payload);
        else if (connections[0] && connections[0].open) connections[0].send(payload);
    }
});

// ===================== P2P DATA =====================
function broadcast(data, exceptConn) {
    connections.forEach(c => { if (c !== exceptConn && c.open) c.send(data); });
}
function addConnection(conn) {
    if (connections.find(c => c.peer === conn.peer)) return;
    connections.push(conn);
    updateList();
    statusEl.textContent = connections.length + " connecte" + (connections.length > 1 ? "s" : "");
    conn.on('data', function(data) {
        if (data.type === 'audio' && data.blob) {
            if (!speakerMuted) {
                var blob = new Blob([data.blob], {type:'audio/webm'});
                new Audio(URL.createObjectURL(blob)).play();
            }
            if (isHost) broadcast(data, conn);
        }
        else if (data.type === 'text' && data.text) {
            addMessageToChat(data.text, data.senderId ? data.senderId.substring(0,10) : "?", false);
            playSmsReceived();
            if (isHost) broadcast(data, conn);
        }
        else if (data.type === 'image' && data.dataUrl) {
            addMessageToChat(data.dataUrl, data.senderId ? data.senderId.substring(0,10) : "?", false, 'image');
            playSmsReceived();
            if (isHost) broadcast(data, conn);
        }
        else if (data.type === 'video' && data.dataUrl) {
            addMessageToChat(data.dataUrl, data.senderId ? data.senderId.substring(0,10) : "?", false, 'video');
            playSmsReceived();
            if (isHost) broadcast(data, conn);
        }
        else if (data.type === 'speaker-muted') {
            var who = data.senderId ? data.senderId.substring(0,10) : "?";
            var msg = data.muted ? '[' + who + '] Talkie coupe - appel seulement' : '[' + who + '] Talkie reactif';
            addMessageToChat(msg, "Systeme", false);
            if (isHost) broadcast(data, conn);
        }
        else if (data.type === 'ping') {}
    });
    conn.on('close', function() {
        connections = connections.filter(c => c !== conn);
        updateList();
        statusEl.textContent = connections.length ? connections.length + " connecte(s)" : "Seul";
    });
}

// ===================== REJOINDRE =====================
function joinRoom() {
    var room = document.getElementById('roomName').value.trim();
    if (!room) { statusEl.textContent = "Entre un code"; return; }
    if (peer) {
        connections.forEach(c => { try { c.close(); } catch(e){} });
        peer.destroy(); connections = [];
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    }
    statusEl.textContent = "Connexion...";
    peer = new Peer(room, { debug: 0, config: { iceServers: [{ urls: "stun:stun.l.google.com:19302" }, { urls: "stun:stun1.l.google.com:19302" }] } });
    peer.on('open', function(id) { myId = id; isHost = true; statusEl.textContent = 'Hote - Code "' + room + '"'; updateList(); });
    peer.on('connection', function(conn) { addConnection(conn); });
    peer.on('call', function(call) { handleIncomingCall(call); });
    peer.on('error', function(err) {
        if (err.type === 'unavailable-id') {
            statusEl.textContent = "Code pris > mode client";
            var clientId = room + '_' + Math.random().toString(36).substr(2,6);
            var newPeer = new Peer(clientId, { debug: 0, config: { iceServers: [{ urls:"stun:stun.l.google.com:19302" }] } });
            newPeer.on('open', function(id) { myId = id; isHost = false; var connToHost = newPeer.connect(room); addConnection(connToHost); statusEl.textContent = 'Client - "' + room + '"'; peer = newPeer; });
            newPeer.on('call', function(call) { handleIncomingCall(call); });
            newPeer.on('error', function() { statusEl.textContent = "Erreur connexion"; });
            peer = newPeer;
        } else { statusEl.textContent = "Erreur : " + err.type; }
    });
}

// ===================== TALKIE-WALKIE =====================
async function startTalking() {
    if (microMuted) { statusEl.textContent = "Micro muet (A/V)"; return; }
    if (connections.length === 0) { statusEl.textContent = "Personne connecte"; return; }
    if (!localStream || !localStream.getAudioTracks().length) {
        try { localStream = await navigator.mediaDevices.getUserMedia({audio: true}); applyMicroMuteToStream(localStream); }
        catch(e) { statusEl.textContent = "Micro inaccessible"; return; }
    }
    audioChunks = [];
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    mediaRecorder = new MediaRecorder(localStream, {mimeType:'audio/webm'});
    mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.start(100);
    startTimer(); // Démarre le chrono
    talkBtn.classList.add('pressing');
    playTalkieStart();
}
function stopTalking() {
    if (!mediaRecorder || mediaRecorder.state === 'inactive') return;
    mediaRecorder.onstop = function() {
        if (audioChunks.length === 0) return;
        var blob = new Blob(audioChunks, {type:'audio/webm'});
        connections.forEach(conn => { if (conn.open) conn.send({type:'audio', blob:blob}); });
        statusEl.textContent = "Envoye";
        playTalkieEnd();
        setTimeout(() => { statusEl.textContent = connections.length ? connections.length + " connecte(s)" : "Seul"; }, 800);
    };
    mediaRecorder.stop();
    stopTimer(); // Animation Snapchat
    talkBtn.classList.remove('pressing');
}
var pressing = false;
function onPress(e) { e.preventDefault(); if (!pressing) { pressing = true; startTalking(); } }
function onRelease(e) { e.preventDefault(); if (pressing) { pressing = false; stopTalking(); } }
talkBtn.addEventListener('pointerdown', onPress);
talkBtn.addEventListener('pointerup', onRelease);
talkBtn.addEventListener('pointerleave', onRelease);
talkBtn.addEventListener('pointercancel', onRelease);

// ===================== APPEL / VISIO =====================
async function startCall(withVideo) {
    if (connections.length === 0) { statusEl.textContent = "Personne connecte"; return; }
    if (currentCall) { hangupCurrentCall(); return; }
    isVideoCall = withVideo;
    try {
        var stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: withVideo ? { facingMode: 'user' } : false });
        localStream = stream;
        applyMicroMuteToStream(localStream);
        if (withVideo) { localVideo.srcObject = stream; videoPanel.style.display = 'block'; }
        var call = peer.call(connections[0].peer, stream, { metadata: { video: withVideo } });
        setupCallHandlers(call, withVideo);
        currentCall = call;
        statusEl.textContent = withVideo ? "Visio en cours..." : "Appel en cours...";
    } catch(e) { statusEl.textContent = "Camera/micro inaccessible"; console.error(e); }
}
function handleIncomingCall(call) {
    pendingCall = call;
    var isVideo = (call.metadata && call.metadata.video) || false;
    isVideoCall = isVideo;
    callPopupTitle.textContent = isVideo ? "VISIO ENTRANT" : "APPEL ENTRANT";
    callPopupSender.textContent = "De : " + call.peer.substring(0,14);
    callPopup.classList.add('open');
    playCallRing();
}
callAcceptBtn.addEventListener('click', async function() {
    callPopup.classList.remove('open');
    if (!pendingCall) return;
    var call = pendingCall; pendingCall = null;
    try {
        var stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: isVideoCall });
        localStream = stream;
        applyMicroMuteToStream(localStream);
        call.answer(stream);
        setupCallHandlers(call, isVideoCall);
        currentCall = call;
        statusEl.textContent = "En communication";
        if (isVideoCall) videoPanel.style.display = 'block';
    } catch(e) { statusEl.textContent = "Micro/caméra inaccessible"; console.error(e); }
});
callRejectBtn.addEventListener('click', function() { callPopup.classList.remove('open'); if (pendingCall) { pendingCall.close(); pendingCall = null; } });
function setupCallHandlers(call, withVideo) {
    call.on('stream', function(remoteStream) {
        remoteVideo.srcObject = remoteStream;
        if (withVideo && localStream) localVideo.srcObject = localStream;
        if (withVideo) videoPanel.style.display = 'block';
        statusEl.textContent = withVideo ? "Visio active" : "En communication";
    });
    call.on('close', function() { cleanupCall(); });
    call.on('error', function() { cleanupCall(); statusEl.textContent = "Erreur appel"; });
}
function hangupCurrentCall() { if (currentCall) currentCall.close(); cleanupCall(); }
function cleanupCall() {
    if (currentCall) currentCall = null;
    remoteVideo.srcObject = null; localVideo.srcObject = null;
    videoPanel.style.display = 'none';
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    statusEl.textContent = connections.length ? connections.length + " connecte(s)" : "Seul";
}
callAudioBtn.addEventListener('click', function() { startCall(false); });
callVideoBtn.addEventListener('click', function() { startCall(true); });

// ===================== MESSAGERIE =====================
function sendTextMessage(content) {
    if (!content.trim()) return;
    if (connections.length === 0) { addMessageToChat("Personne connectee", "Systeme"); return; }
    addMessageToChat(content, myId.substring(0,10), true);
    playSmsSent();
    var payload = { type:'text', text:content, senderId:myId, timestamp:Date.now() };
    if (isHost) broadcast(payload);
    else if (connections[0] && connections[0].open) connections[0].send(payload);
}
function handleSendSms() { var msg = smsInput.value.trim(); if (msg) { sendTextMessage(msg); smsInput.value = ""; } }
sendSmsBtn.addEventListener('click', handleSendSms);
smsInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') { e.preventDefault(); handleSendSms(); } });
mediaPickerBtn.addEventListener('click', function() { fileInput.click(); });
fileInput.addEventListener('change', function() {
    var file = fileInput.files[0];
    if (!file) return;
    if (connections.length === 0) { addMessageToChat("Personne connectee", "Systeme"); return; }
    var MAX_SIZE = 5 * 1024 * 1024;
    if (file.size > MAX_SIZE) { addMessageToChat("Fichier trop lourd (max 5 Mo)", "Systeme", true); fileInput.value = ''; return; }
    var reader = new FileReader();
    reader.onload = function(e) {
        var dataUrl = e.target.result;
        var type = file.type.startsWith('image/') ? 'image' : 'video';
        addMessageToChat(dataUrl, myId.substring(0,10), true, type);
        playSmsSent();
        var payload = { type:type, dataUrl:dataUrl, senderId:myId, timestamp:Date.now() };
        if (isHost) broadcast(payload);
        else if (connections[0] && connections[0].open) connections[0].send(payload);
    };
    reader.readAsDataURL(file);
    fileInput.value = '';
});

        <path d="M45 1 Q64 19 45 37" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>

        img.onerror = null;
    }
})();

window.joinRoom = joinRoom;
window.openLightbox = openLightbox;
window.addEventListener('beforeunload', function() { 
    if (localStream) localStream.getTracks().forEach(t => t.stop()); 
    if (peer) peer.destroy(); 
});

// ===== PING 20 secondes =====
setInterval(function() {
    if (connections.length > 0) {
        var payload = { type: 'ping' };
        if (isHost) broadcast(payload);
        else if (connections[0] && connections[0].open) connections[0].send(payload);
    }
}, 20000);
</script>
