<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calculatrix</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

/* MATRIX BACKGROUND */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* TITLE */
.title {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  font-size: 40px;
  color: #00ff88;
  text-shadow: 0 0 20px #00ff88;
  z-index: 2;
}

/* CALCULATOR */
.calculator {
  position: relative;
  z-index: 2;
  margin: auto;
  top: 80px;
  width: 320px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 0 30px rgba(0,255,0,0.3);
}

#display {
  width: 100%;
  height: 60px;
  background: black;
  border: none;
  color: #00ff88;
  font-size: 28px;
  text-align: right;
  padding: 10px;
  margin-bottom: 10px;
}

/* BUTTONS */
.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

button {
  height: 60px;
  border: none;
  border-radius: 12px;
  font-size: 22px;
  color: #00ff88;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(6px);
  box-shadow: 0 0 10px rgba(0,255,0,0.2);
}

.equal { background: rgba(0,255,0,0.3); }
.clear { background: rgba(255,0,0,0.3); }

/* SETUP SCREEN */
#setup {
  position: fixed;
  z-index: 3;
  background: black;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

#setup input {
  padding: 15px;
  font-size: 20px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="title">CALCULATRIX</div>

<!-- SETUP CODE -->
<div id="setup">
  <div>
    <p style="color:#00ff88;">Choisis ton code secret</p>
    <input type="password" id="newCode">
    <button onclick="saveCode()">Valider</button>
  </div>
</div>

<!-- CALCULATOR -->
<div class="calculator">
  <input id="display" readonly>

  <div class="buttons">
    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button onclick="press('/')">÷</button>

    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button onclick="press('*')">×</button>

    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button onclick="press('-')">−</button>

    <button onclick="press('0')">0</button>
    <button onclick="press('.')">.</button>
    <button class="equal" onclick="calculate()">=</button>
    <button onclick="press('+')">+</button>

    <button class="clear" onclick="clearDisplay()">C</button>
  </div>
</div>

<script>
// MATRIX EFFECT
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];
for (let i = 0; i < columns; i++) drops[i] = 1;

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#0f0";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(draw, 33);

// 🔐 SETUP CODE
if (localStorage.getItem("code")) {
  document.getElementById("setup").style.display = "none";
}

function saveCode() {
  let code = document.getElementById("newCode").value;
  if (code) {
    localStorage.setItem("code", code);
    document.getElementById("setup").style.display = "none";
  }
}

// CALCULATOR
let input = "";

function press(val) {
  input += val;
  document.getElementById("display").value = input;
}

function calculate() {
  let saved = localStorage.getItem("code");

  if (input === saved) {
    window.location.href = "app.html";
    return;
  }

  if (input === "0000") {
    localStorage.removeItem("code");
    location.reload();
    return;
  }

  try {
    input = eval(input).toString();
    document.getElementById("display").value = input;
  } catch {
    input = "";
    document.getElementById("display").value = "Erreur";
  }
}

function clearDisplay() {
  input = "";
  document.getElementById("display").value = "";
}
</script>

</body>
</html>
