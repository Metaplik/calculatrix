<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculatrix</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: Arial;
  background: black;
}

/* MATRIX */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* CONTAINER */
.container {
  position: relative;
  z-index: 1;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* TITLE 3D */
.title {
  color: #00ff88;
  font-size: 34px;
  margin-bottom: 20px;
  letter-spacing: 3px;

  text-shadow:
    1px 1px 0 #003b1f,
    2px 2px 0 #002814,
    3px 3px 5px rgba(0,0,0,0.8),
    0 0 10px #00ff88;
}

/* CALCULATOR */
.calculator {
  background: rgba(20,20,20,0.85);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 0 30px rgba(0,255,100,0.3);
  width: 90%;
  max-width: 320px;
}

/* DISPLAY */
#display {
  width: 100%;
  height: 70px;
  background: black;
  border: none;
  color: #00ff88;
  font-size: 28px;
  text-align: right;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 15px;
}

/* BUTTON GRID */
.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

/* BUTTONS */
button {
  height: 60px;
  border-radius: 15px;
  border: none;
  font-size: 20px;
  color: #00ff88;
  cursor: pointer;

  background: rgba(0,255,100,0.05);
  box-shadow:
    inset 0 0 5px rgba(0,255,100,0.2),
    0 0 10px rgba(0,255,100,0.2);
  transition: 0.2s;
}

button:hover {
  background: rgba(0,255,100,0.2);
  transform: scale(1.05);
}

.equal {
  background: rgba(0,255,100,0.3);
}

.clear {
  background: rgba(255,0,0,0.3);
  color: white;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
  <div class="title">CALCULATRIX</div>

  <div class="calculator">
    <input id="display" readonly>

    <div class="buttons">
      <button onclick="press('7')">7</button>
      <button onclick="press('8')">8</button>
      <button onclick="press('9')">9</button>
      <button onclick="press('/')">÷</button>

      <button onclick="press('4')">4</button>
      <button onclick="press('5')">5</button>
      <button onclick="press('6')">6</button>
      <button onclick="press('*')">×</button>

      <button onclick="press('1')">1</button>
      <button onclick="press('2')">2</button>
      <button onclick="press('3')">3</button>
      <button onclick="press('-')">−</button>

      <button onclick="press('0')">0</button>
      <button onclick="press('.')">.</button>
      <button class="equal" onclick="calculate()">=</button>
      <button onclick="press('+'); plusClick()">+</button>

      <button class="clear" onclick="clearDisplay()">C</button>
    </div>
  </div>
</div>

<script>

/* ================= MATRIX ================= */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = Array.from({length: columns}).fill(1);

function drawMatrix() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff88";
  ctx.font = fontSize + "px monospace";

  drops.forEach((y, i) => {
    const text = letters[Math.floor(Math.random()*letters.length)];
    const x = i * fontSize;

    ctx.fillText(text, x, y * fontSize);

    if (y * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  });
}

setInterval(drawMatrix, 33);

/* ================= CODE SECRET ================= */
let savedCode = localStorage.getItem("code");

if (!savedCode) {
  let newCode = prompt("Choisis ton code secret");
  if (newCode) {
    localStorage.setItem("code", newCode);
  }
}

/* ================= CALCUL ================= */
let input = "";

function press(val) {
  input += val;
  document.getElementById("display").value = input;
}

function calculate() {
  let savedCode = localStorage.getItem("code");

  if (input === savedCode) {
    window.location.href = "app.html";
    return;
  }

  if (input === "+++++") {
    localStorage.removeItem("code");
    alert("RESET EFFECTUÉ");
    location.reload();
    return;
  }

  try {
    input = eval(input).toString();
    document.getElementById("display").value = input;
  } catch {
    document.getElementById("display").value = "Erreur";
    input = "";
  }
}

function clearDisplay() {
  input = "";
  document.getElementById("display").value = "";
}

/* ================= RESET 5x + ================= */
let plusCount = 0;

document.addEventListener("keydown", function(e) {
  if (e.key === "+") {
    plusClick();
  }
});

function plusClick() {
  plusCount++;

  if (plusCount === 5) {
    resetAll();
    plusCount = 0;
  }

  setTimeout(() => {
    plusCount = 0;
  }, 2000);
}

/* ================= RESET ================= */
function resetAll() {
  localStorage.removeItem("code");
  alert("RESET CODE EFFECTUÉ");
  window.location.href = "index.html";
}

</script>

</body>
</html>
